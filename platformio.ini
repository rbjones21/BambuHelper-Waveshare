; BambuHelper - Bambu Lab Printer Monitor
; Waveshare ESP32-S3-Touch-LCD-4.3 (800x480 RGB, GT911 touch)

; --- Shared library dependencies ---
[common]
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0

; =============================================================================
;  Waveshare ESP32-S3-Touch-LCD-4.3
; =============================================================================
[env:esp32s3-waveshare-4_3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_build.psram_type = opi

lib_deps = ${common.lib_deps}

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM=1
    -D WAVESHARE_S3_TOUCH_LCD_4_3=1
    ; --- Display: 800x480 RGB parallel, ST7262 ---
    -D SCREEN_WIDTH=800
    -D SCREEN_HEIGHT=480
    ; --- LovyanGFX configured in code (lgfx_waveshare.h) ---
    -D DISABLE_ALL_LIBRARY_WARNINGS=1
